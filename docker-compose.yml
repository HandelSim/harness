# harness — service composition.
#
# All services share a single user-defined bridge network (`harness-net`) so
# they reach each other by service name. The hostname `proxy` in particular
# is load-bearing: ollama's OLLAMA_REMOTES allowlist matches on the literal
# hostname from the RemoteHost URL, so renaming the proxy service requires
# updating OLLAMA_REMOTES to match.
#
# The .env file lives at the install root (the same directory as this file —
# the install root IS the git clone). Runtime state (volume contents) lives
# under ./state/. Invoke with: docker compose --env-file ./.env up

networks:
  harness-net:
    driver: bridge

services:
  # -------------------------------------------------------------------------
  # ollama — runs the engine and registers a stub model whose RemoteHost
  # points at the proxy service. The custom Dockerfile + entrypoint handle
  # the registration on container start.
  # -------------------------------------------------------------------------
  ollama:
    build:
      # Repo root context so the Dockerfile can COPY firewall/ scripts.
      context: .
      dockerfile: ollama/Dockerfile
      args:
        OLLAMA_VERSION: ${OLLAMA_VERSION:-0.21.2}
    image: harness-ollama:${OLLAMA_VERSION:-0.21.2}
    environment:
      # Bind to all interfaces inside the container so other services on
      # harness-net can reach ollama at http://ollama:11434.
      OLLAMA_HOST: 0.0.0.0:11434
      # CRITICAL: must match the literal hostname in the RemoteHost URL.
      # Ollama uses slices.Contains for matching — exact string, no DNS.
      OLLAMA_REMOTES: proxy
      OLLAMA_AGENT_MODEL: ${OLLAMA_AGENT_MODEL:-harness}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-200000}
      # The entrypoint reads PROXY_PORT to build the RemoteHost URL.
      PROXY_PORT: ${PROXY_PORT:-8000}
    volumes:
      # Persist the blob store across container rebuilds. The relative path
      # resolves against this compose file, putting it at <install-root>/state/ollama-data.
      - ./state/ollama-data:/root/.ollama
      # Universal egress firewall reads its allowlist from this path.
      - ${HARNESS_ALLOWLIST_PATH:-./.harness-allowlist}:/etc/harness/allowlist:ro
    # init-firewall.sh requires NET_ADMIN and NET_RAW to manage iptables/ipset.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - harness-net
    # Always expose internally. Other services on harness-net reach ollama
    # at http://ollama:11434 via this exposure, no host port required.
    expose:
      - "11434"
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s

  # -------------------------------------------------------------------------
  # proxy — translates between ollama's wire format and the upstream's,
  # injects cooperative tool-use prompts, parses tool calls back from
  # the upstream's response.
  # -------------------------------------------------------------------------
  proxy:
    build:
      # Repo root context so the Dockerfile can COPY firewall/ scripts.
      context: .
      dockerfile: proxy/Dockerfile
    image: harness-proxy:latest
    environment:
      PROXY_API_URL: ${PROXY_API_URL:-}
      PROXY_API_KEY: ${PROXY_API_KEY:-}
      PROXY_API_MODEL: ${PROXY_API_MODEL:-}
      PROXY_HOST: ${PROXY_HOST:-0.0.0.0}
      PROXY_PORT: ${PROXY_PORT:-8000}
      # OUTPUT_DIR is optional — empty by default (no debug dumps).
      # Users opt in by setting OUTPUT_DIR=/output in .env, then bind-mount
      # the host path of their choice via the volume below.
      OUTPUT_DIR: ${OUTPUT_DIR:-}
      # Cooperative-prompt injection mode: user_front (default) / user_bookend
      # / user / system / hybrid. See .env.example for the full description.
      PROXY_PROMPT_MODE: ${PROXY_PROMPT_MODE:-user_front}
    volumes:
      # When OUTPUT_DIR is set, the proxy writes per-request debug files here.
      # On Windows users should set OUTPUT_DIR=//output to bypass MSYS path
      # translation; both forms resolve to this same host directory.
      - ./state/output:/output
      # Universal egress firewall reads its allowlist from this path.
      - ${HARNESS_ALLOWLIST_PATH:-./.harness-allowlist}:/etc/harness/allowlist:ro
    # init-firewall.sh requires NET_ADMIN and NET_RAW to manage iptables/ipset.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - harness-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${PROXY_PORT:-8000}/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s

  # -------------------------------------------------------------------------
  # Unified agent service. Excluded from default compose operations via the
  # `agent` profile so `docker compose up` doesn't try to start it. The
  # entrypoint dispatches on a mode arg (claude / opencode / shell) so a
  # single image and a single bind-mounted home backs all agent invocations.
  # -------------------------------------------------------------------------
  agent:
    build:
      # Repo root context so the Dockerfile can COPY firewall/ scripts.
      context: .
      dockerfile: agents/Dockerfile
    image: harness-agent:latest
    # Agents are launched ephemerally via `harness <mode>` (docker run), but
    # we still declare cap_add + the allowlist mount here so that
    # `docker compose up agent` works for debugging and so the runtime
    # contract is documented in one place. The harness CLI applies the same
    # set on its docker run call.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ${HARNESS_ALLOWLIST_PATH:-./.harness-allowlist}:/etc/harness/allowlist:ro
    networks:
      - harness-net
    profiles:
      - agent
    # No restart policy: agents are ephemeral, launched per-invocation by
    # the `harness` script via `docker run`.
