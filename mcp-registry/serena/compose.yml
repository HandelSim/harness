# Serena MCP — semantic code analysis service.
#
# Brought up by `harness start` whenever Serena is enabled
# (<install-root>/state/mcp/serena/compose.yml present). Reach it from agents at
# http://serena:9121/sse on the harness-net network.
#
# This snippet is merged with harness/docker-compose.yml via additional
# `-f` args. Everything here either references the main compose file
# (network) or expands env vars the harness script exports at compose time.
#
# Build context: pulled directly from upstream's git repo. The first
# `harness start` after enabling Serena therefore builds the image (~5–10
# minutes; ~2GB result). Subsequent starts reuse the cached image.

services:
  serena:
    # Pinned to a specific upstream tag. Bump deliberately when re-testing
    # against newer versions. The image tag is local-only; we don't push.
    image: harness-serena:v0.1
    build:
      # Upstream historically lived at docker/Dockerfile; current main has
      # the Dockerfile at the repo root.
      context: https://github.com/oraios/serena.git#main
      dockerfile: Dockerfile
    container_name: harness-serena
    networks:
      - harness-net
    profiles:
      - mcp
    # NET_ADMIN/NET_RAW are reserved for the universal harness firewall.
    # Serena's upstream image does not currently bake in init-firewall.sh,
    # so the firewall is not actively applied inside this container — but
    # we declare the capabilities and the allowlist mount uniformly so a
    # future entrypoint override (Phase B2) can switch it on without
    # changing the compose surface.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      SERENA_DOCKER: "1"
      # Bind the SSE listener on all in-container interfaces so agents on
      # harness-net can reach it. Matches the --host 0.0.0.0 in `command`.
      SERENA_HOST: 0.0.0.0
      SERENA_PORT: "9121"
    volumes:
      # The user's project root, read-only. Serena indexes code from here
      # but cannot modify it — edits flow through the agent (which has
      # write access to its own CWD via /workspace). HARNESS_PROJECTS_ROOT
      # defaults to the host's $HOME, which exposes everything; users who
      # want a tighter scope set it to a single tree in .env.
      #
      # Mounted at /workspaces/projects/ (NOT /workspaces) because the
      # upstream serena image bakes its own install at /workspaces/serena/
      # — mounting directly at /workspaces shadows the image content and
      # leaves the container with no serena code to run. Per upstream
      # DOCKER.md, projects activate via /workspaces/projects/<name>.
      - ${HARNESS_PROJECTS_ROOT:-/home}:/workspaces/projects:ro
      # Per-install index cache. Mounted at a path the image leaves
      # writable (NOT /workspaces/serena/config — that holds the seeded
      # serena_config.yml, and a bind mount would shadow it with an empty
      # directory and break startup). The dashboard's `~/.serena/` is
      # what holds project-list state across restarts.
      - ${INSTALL_ROOT}/state/mcp/serena/data:/root/.serena
      # Universal egress firewall allowlist. Same path/policy as harness's
      # own services — see the cap_add note above for why this is mounted
      # even when the firewall is not actively applied.
      - ${HARNESS_ALLOWLIST_PATH:-${INSTALL_ROOT}/.harness-allowlist}:/etc/harness/allowlist:ro
    # The Serena dashboard listens on 24282 inside the container; other
    # services on harness-net can reach it via this `expose`. To publish
    # it to a host port, set SERENA_DASHBOARD_PORT in .env and add a
    # `ports: ["${SERENA_DASHBOARD_PORT}:24282"]` block via a local
    # docker-compose override — a static conditional `ports:` entry can't
    # be expressed here (compose treats an empty string as `invalid proto`).
    # Use the installed `serena` CLI directly. The image entrypoint
    # already activates /workspaces/serena/.venv before exec'ing $@, so
    # `serena` resolves on PATH. Upstream's compose.yaml uses the stale
    # `uv run --directory . serena-mcp-server` form, which (a) re-resolves
    # the venv on every start and (b) calls a binary name that no longer
    # exists in current main — the entrypoint was renamed to the
    # `start-mcp-server` subcommand.
    command:
      - "serena"
      - "start-mcp-server"
      - "--transport"
      - "sse"
      - "--port"
      - "9121"
      - "--host"
      - "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9121/sse -m 2 -N -o /dev/null & sleep 1; kill $$! 2>/dev/null; exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  # Same network the main docker-compose.yml declares. With matching short
  # name and no `external: true`, compose merges the two declarations into
  # a single project-namespaced network (`<project>_harness-net`) on the
  # first `up` and reuses it on subsequent ones. This keeps the fixture
  # portable across project names.
  harness-net:
